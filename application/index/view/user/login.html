{extend name="public/base" /}

{block name="content"}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>用户登录</h2>
                <p>欢迎回来！</p>
            </div>
            <form action="/user/doLogin" method="post" data-validate class="auth-body">
                <div class="form-group">
                    <label for="username">用户名 / 邮箱 / 手机</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名、邮箱或手机号">
                    <div class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="请输入密码">
                    <div class="form-error"></div>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" id="remember" name="remember" checked>
                    <label for="remember">记住登录状态</label>
                </div>
                <button type="submit" class="btn-auth">登 录</button>
            </form>
            <div class="auth-footer">
                还没有账号？<a href="/user/register">立即注册</a>
            </div>
        </div>
    </div>
</div>
{/block}
