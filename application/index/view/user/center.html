{extend name="public/base" /}

{block name="content"}
<!-- 面包屑导航 -->
<nav class="breadcrumb">
    <div class="container">
        <a href="/">首页</a>
        <span>/</span>
        <span>个人中心</span>
    </div>
</nav>

<div class="user-center">
    <div class="user-center-header">
        <img class="user-center-avatar" src="{$user.avatar|default='/static/images/default-avatar.png'}" alt="avatar">
        <div class="user-center-info">
            <h2>{$user.nickname|default=$user.username}</h2>
            <p>UID: {$user.id} | 注册时间: {$user.create_time}</p>
        </div>
    </div>

    <div class="user-center-menu">
        <a href="/user/center" class="active"><i class="fas fa-user"></i> 个人资料</a>
        <a href="/user/articles"><i class="fas fa-newspaper"></i> 我的文章</a>
        <a href="/user/comments"><i class="fas fa-comments"></i> 我的评论</a>
        <a href="/user/settings"><i class="fas fa-cog"></i> 账号设置</a>
    </div>

    <div class="user-center-content">
        <form action="/user/updateProfile" method="post" class="user-info-form">
            <div class="user-avatar-upload">
                <img class="user-avatar-preview" src="{$user.avatar|default='/static/images/default-avatar.png'}" alt="avatar">
                <div>
                    <label for="avatarFile">更换头像</label>
                    <input type="file" id="avatarFile" accept="image/*">
                    <p class="text-muted mt-sm" style="font-size:12px;">支持 JPG、PNG 格式，建议尺寸 200x200</p>
                </div>
            </div>

            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" value="{$user.username}" disabled>
            </div>
            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" name="nickname" value="{$user.nickname}" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" value="{$user.email|default=''}" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" name="phone" value="{$user.phone|default=''}" placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <button type="submit" class="btn-auth">保存修改</button>
            </div>
        </form>
    </div>
</div>
{/block}
