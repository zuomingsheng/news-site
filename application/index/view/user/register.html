{extend name="public/base" /}

{block name="content"}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>用户注册</h2>
                <p>加入我们，获取更多资讯</p>
            </div>
            <form action="/user/doRegister" method="post" data-validate class="auth-body">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required minlength="3" maxlength="20" placeholder="3-20位字母、数字或下划线">
                    <div class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="至少6位字符">
                    <div class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required equalto="#password" placeholder="再次输入密码">
                    <div class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="email">邮箱（选填）</label>
                    <input type="email" id="email" name="email" placeholder="用于找回密码">
                    <div class="form-error"></div>
                </div>
                <div class="form-group">
                    <label for="phone">手机号（选填）</label>
                    <input type="tel" id="phone" name="phone" placeholder="用于找回密码">
                    <div class="form-error"></div>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">我已阅读并同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a></label>
                </div>
                <button type="submit" class="btn-auth">注 册</button>
            </form>
            <div class="auth-footer">
                已有账号？<a href="/user/login">立即登录</a>
            </div>
        </div>
    </div>
</div>
{/block}
