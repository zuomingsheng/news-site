{assign name="currentMenu" value="category" /}
{extend name="public/base" /}

{block name="content"}
<div class="admin-panel">
    <div class="panel-header">
        <h3><i class="fas fa-plus"></i> 添加分类</h3>
    </div>
    <div class="panel-body">
        <form id="categoryForm">
            <div class="form-group">
                <label>分类名称 *</label>
                <input type="text" name="name" class="form-control" required placeholder="请输入分类名称">
            </div>

            <div class="form-group">
                <label>上级分类</label>
                <select name="parent_id" class="form-control">
                    <option value="0">顶级分类</option>
                    {volist name="categories" id="cat"}
                    <option value="{$cat.id}">{$cat.name}</option>
                    {/volist}
                </select>
            </div>

            <div class="form-group">
                <label>排序</label>
                <input type="number" name="sort" class="form-control" value="0" placeholder="数字越小越靠前">
            </div>

            <div class="form-group">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
                <a href="/admin/category/index" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="script"}
<script>
$('#categoryForm').submit(function(e) {
    e.preventDefault();

    $.ajax({
        url: '/admin/category/add',
        type: 'POST',
        data: $(this).serialize(),
        success: function(res) {
            if (res.code === 1) {
                alert('添加成功');
                location.href = '/admin/category';
            } else {
                alert(res.msg || '添加失败');
            }
        }
    });
});
</script>
{/block}
