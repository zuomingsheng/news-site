{assign name="currentMenu" value="category" /}
{extend name="public/base" /}

{block name="content"}
<div class="admin-panel">
    <div class="panel-header">
        <h3><i class="fas fa-edit"></i> 编辑分类</h3>
    </div>
    <div class="panel-body">
        <form id="categoryForm">
            <input type="hidden" name="id" value="{$category.id}">

            <div class="form-group">
                <label>分类名称 *</label>
                <input type="text" name="name" class="form-control" required value="{$category.name}">
            </div>

            <div class="form-group">
                <label>上级分类</label>
                <select name="parent_id" class="form-control">
                    <option value="0">顶级分类</option>
                    {volist name="categories" id="cat"}
                    <option value="{$cat.id}" {if intval($category.parent_id) == intval($cat.id)}selected{/if}>{$cat.name}</option>
                    {/volist}
                </select>
            </div>

            <div class="form-group">
                <label>排序</label>
                <input type="number" name="sort" class="form-control" value="{$category.sort}">
            </div>

            <div class="form-group">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1" {if intval($category.status) == 1}selected{/if}>启用</option>
                    <option value="0" {if intval($category.status) == 0}selected{/if}>禁用</option>
                </select>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
                <a href="/admin/category/index" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="script"}
<script>
$('#categoryForm').submit(function(e) {
    e.preventDefault();

    $.ajax({
        url: '/admin/category/edit',
        type: 'POST',
        data: $(this).serialize(),
        success: function(res) {
            if (res.code === 1) {
                alert('更新成功');
                location.href = '/admin/category';
            } else {
                alert(res.msg || '更新失败');
            }
        }
    });
});
</script>
{/block}
