{assign name="currentMenu" value="system" /}
{extend name="public/base" /}

{block name="content"}
<div class="admin-panel">
    <div class="panel-header">
        <h3><i class="fas fa-cog"></i> 系统设置</h3>
    </div>
    <div class="panel-body">
        <form action="" method="post" style="max-width: 600px;">
            <h4 style="margin-bottom: 15px; color: var(--admin-primary);">基本信息</h4>

            <div class="form-group">
                <label>网站名称</label>
                <input type="text" name="configs[site_name]" class="form-control" value="{$configs.base.site_name|default=''}" placeholder="综合新闻网站">
            </div>

            <div class="form-group">
                <label>网站标题</label>
                <input type="text" name="configs[site_title]" class="form-control" value="{$configs.base.site_title|default=''}" placeholder="网站标题">
            </div>

            <div class="form-group">
                <label>ICP备案号</label>
                <input type="text" name="configs[site_icp]" class="form-control" value="{$configs.base.site_icp|default=''}" placeholder="京ICP备XXXXXXXX号">
            </div>

            <div class="form-group">
                <label>联系邮箱</label>
                <input type="email" name="configs[contact_email]" class="form-control" value="{$configs.contact.contact_email|default=''}" placeholder="contact@example.com">
            </div>

            <hr style="margin: 25px 0;">

            <h4 style="margin-bottom: 15px; color: var(--admin-primary);">SEO设置</h4>

            <div class="form-group">
                <label>网站关键词</label>
                <input type="text" name="configs[site_keywords]" class="form-control" value="{$configs.seo.site_keywords|default=''}" placeholder="新闻,资讯,国内新闻,国际新闻">
            </div>

            <div class="form-group">
                <label>网站描述</label>
                <textarea name="configs[site_description]" class="form-control" rows="3" placeholder="网站描述">{$configs.seo.site_description|default=''}</textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存设置</button>
            </div>
        </form>
    </div>
</div>
{/block}
