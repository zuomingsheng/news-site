{assign name="currentMenu" value="article" /}
{extend name="public/base" /}

{block name="content"}
<div class="admin-panel">
    <div class="panel-header">
        <h3><i class="fas fa-edit"></i> 编辑文章</h3>
    </div>
    <div class="panel-body">
        <form id="articleForm">
            <input type="hidden" name="id" value="{$article.id}">

            <div class="form-group">
                <label>文章标题 *</label>
                <input type="text" name="title" class="form-control" required value="{$article.title}">
            </div>

            <div class="form-group">
                <label>文章摘要</label>
                <textarea name="summary" class="form-control" rows="2">{$article.summary|default=''}</textarea>
            </div>

            <div class="form-group">
                <label>所属分类 *</label>
                <select name="category_id" class="form-control" required>
                    <option value="">请选择分类</option>
                    {volist name="categories" id="cat"}
                    <option value="{$cat.id}" {if intval($article.category_id) == intval($cat.id)}selected{/if}>{$cat.name}</option>
                    {/volist}
                </select>
            </div>

            <div class="form-group">
                <label>封面图片</label>
                <div class="upload-widget">
                    <input type="hidden" name="cover" id="coverInput" value="{$article.cover}">
                    <input type="file" id="coverFile" accept="image/*" style="display:none;">
                    <button type="button" class="btn btn-default btn-sm" id="coverUploadBtn"><i class="fas fa-upload"></i> 本地上传</button>
                    {notempty name="article.cover"}
                    <img src="{$article.cover}" id="coverPreview" class="image-preview">
                    {/notempty}
                </div>
            </div>

            <div class="form-group">
                <label>文章内容 *</label>
                <textarea name="content" id="contentInput">{$article.content|html_entity_decode}</textarea>
            </div>

            <div class="form-group">
                <label>文章状态</label>
                <select name="status" class="form-control">
                    <option value="0" {if intval($article.status) == 0}selected{/if}>草稿</option>
                    <option value="1" {if intval($article.status) == 1}selected{/if}>已发布</option>
                    <option value="2" {if intval($article.status) == 2}selected{/if}>已下线</option>
                </select>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" name="is_top" value="1" {if intval($article.is_top) == 1}checked{/if}> 置顶
                </label>
                <label style="margin-left: 20px;">
                    <input type="checkbox" name="is_recommend" value="1" {if intval($article.is_recommend) == 1}checked{/if}> 推荐
                </label>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
                <a href="/admin/article/index" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="script"}
<script>
// 封面上传
$(document).on('click', '#coverUploadBtn', function() {
    $('#coverFile').click();
});
$('#coverFile').change(function() {
    var file = this.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append('file', file);
    $.ajax({
        url: '/admin/upload/image',
        type: 'POST',
        dataType: 'json',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.code === 1) {
                $('#coverInput').val(res.data.url);
                $('#coverPreview').attr('src', res.data.url).show();
            } else {
                alert(res.msg || '上传失败');
            }
        },
        error: function() { alert('上传请求失败'); }
    });
});

// 初始化 TinyMCE 富文本编辑器
if (typeof tinymce !== 'undefined') {
    tinymce.init({
        selector: '#contentInput',
        height: 400,
        language: 'zh_CN',
        menubar: false,
        plugins: [
            'advlist', 'autolink', 'lists', 'link', 'image',
            'charmap', 'preview', 'searchreplace',
            'visualblocks', 'code', 'fullscreen',
            'insertdatetime', 'table', 'wordcount'
        ],
        toolbar: [
            'undo redo | formatselect | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify',
            'bullist numlist outdent indent | link image | removeformat | code fullscreen'
        ],
        content_style: 'body { font-family: Arial; font-size: 14px; }',
        images_upload_handler: function(blobInfo) {
            return new Promise(function(resolve, reject) {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/admin/upload/image');
                xhr.withCredentials = false;
                xhr.onload = function() {
                    if (xhr.status !== 200) {
                        reject('HTTP Error: ' + xhr.status);
                        return;
                    }
                    var json = JSON.parse(xhr.responseText);
                    if (json.code !== 1) {
                        reject(json.msg || '上传失败');
                        return;
                    }
                    resolve(json.data.url);
                };
                xhr.onerror = function() { reject('网络错误'); };
                var formData = new FormData();
                formData.append('file', blobInfo.blob(), blobInfo.filename());
                xhr.send(formData);
            });
        },
    });
}

$('#articleForm').submit(function(e) {
    e.preventDefault();
    if (typeof tinymce !== 'undefined') {
        tinymce.triggerSave();
    }
    $.ajax({
        url: '/admin/article/edit',
        type: 'POST',
        dataType: 'json',
        data: $(this).serialize(),
        success: function(res) {
            if (res.code === 1) {
                alert('更新成功');
                location.href = '/admin/article/index';
            } else {
                alert(res.msg || '更新失败');
            }
        },
        error: function(xhr, status, err) {
            alert('请求失败: ' + status + ' ' + err);
        }
    });
});
</script>
{/block}
