{assign name="currentMenu" value="user" /}
{extend name="public/base" /}

{block name="content"}
<div class="admin-panel">
    <div class="panel-header">
        <h3><i class="fas fa-plus"></i> 添加用户</h3>
    </div>
    <div class="panel-body">
        <form id="userForm" style="max-width: 500px;">
            <div class="form-group">
                <label>用户名 *</label>
                <input type="text" name="username" class="form-control" required placeholder="3-20位字母、数字或下划线">
            </div>

            <div class="form-group">
                <label>密码 *</label>
                <input type="password" name="password" class="form-control" required minlength="6" placeholder="至少6位字符">
            </div>

            <div class="form-group">
                <label>昵称</label>
                <input type="text" name="nickname" class="form-control" placeholder="请输入昵称">
            </div>

            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" class="form-control" placeholder="请输入邮箱">
            </div>

            <div class="form-group">
                <label>手机号</label>
                <input type="tel" name="phone" class="form-control" placeholder="请输入手机号">
            </div>

            <div class="form-group">
                <label>用户类型</label>
                <select name="is_admin" class="form-control">
                    <option value="0">普通用户</option>
                    <option value="1">管理员</option>
                </select>
            </div>

            <div class="form-group">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1">正常</option>
                    <option value="0">禁用</option>
                </select>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
                <a href="/admin/user/index" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="script"}
<script>
$('#userForm').submit(function(e) {
    e.preventDefault();
    $.ajax({
        url: '/admin/user/add',
        type: 'POST',
        data: $(this).serialize(),
        success: function(res) {
            if (res.code === 1) {
                alert('添加成功');
                location.href = '/admin/user';
            } else {
                alert(res.msg || '添加失败');
            }
        }
    });
});
</script>
{/block}
