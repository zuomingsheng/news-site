{assign name="currentMenu" value="banner" /}
{extend name="public/base" /}

{block name="content"}
<div class="admin-panel">
    <div class="panel-header">
        <h3><i class="fas fa-edit"></i> 编辑轮播</h3>
    </div>
    <div class="panel-body">
        <form id="bannerForm" style="max-width: 600px;">
            <input type="hidden" name="id" value="{$banner.id}">

            <div class="form-group">
                <label>轮播标题</label>
                <input type="text" name="title" class="form-control" value="{$banner.title|default=''}">
            </div>

            <div class="form-group">
                <label>轮播图片 *</label>
                <div class="upload-widget">
                    <input type="hidden" name="image" id="imageInput" value="{$banner.image}">
                    <input type="file" id="imageFile" accept="image/*" style="display:none;">
                    <button type="button" class="btn btn-default" id="imageUploadBtn"><i class="fas fa-upload"></i> 本地上传</button>
                </div>
                {notempty name="banner.image"}
                <img src="{$banner.image}" id="imagePreview" class="image-preview" style="max-width:400px;margin-top:10px;">
                {/notempty}
            </div>

            <div class="form-group">
                <label>跳转链接</label>
                <input type="text" name="url" class="form-control" value="{$banner.url|default=''}">
            </div>

            <div class="form-group">
                <label>排序</label>
                <input type="number" name="sort" class="form-control" value="{$banner.sort}">
            </div>

            <div class="form-group">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1" {if intval($banner.status) == 1}selected{/if}>启用</option>
                    <option value="0" {if intval($banner.status) == 0}selected{/if}>禁用</option>
                </select>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
                <a href="/admin/banner" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="script"}
<script>
$(document).on('click', '#imageUploadBtn', function() {
    $('#imageFile').click();
});
$('#imageFile').change(function() {
    var file = this.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append('file', file);
    $.ajax({
        url: '/admin/upload/image',
        type: 'POST',
        dataType: 'json',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.code === 1) {
                $('#imageInput').val(res.data.url);
                $('#imagePreview').attr('src', res.data.url).show();
            } else {
                alert(res.msg || '上传失败');
            }
        },
        error: function() { alert('上传请求失败'); }
    });
});

$('#bannerForm').submit(function(e) {
    e.preventDefault();
    $.ajax({
        url: '/admin/banner/edit',
        type: 'POST',
        dataType: 'json',
        data: $(this).serialize(),
        success: function(res) {
            if (res.code === 1) {
                alert('更新成功');
                location.href = '/admin/banner';
            } else {
                alert(res.msg || '更新失败');
            }
        },
        error: function(xhr, status, err) {
            alert('请求失败: ' + status + ' ' + err);
        }
    });
});
</script>
{/block}
