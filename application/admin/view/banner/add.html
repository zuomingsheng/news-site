{assign name="currentMenu" value="banner" /}
{extend name="public/base" /}

{block name="content"}
<div class="admin-panel">
    <div class="panel-header">
        <h3><i class="fas fa-plus"></i> 添加轮播</h3>
    </div>
    <div class="panel-body">
        <form id="bannerForm" style="max-width: 600px;">
            <div class="form-group">
                <label>轮播标题</label>
                <input type="text" name="title" class="form-control" placeholder="请输入轮播标题">
            </div>

            <div class="form-group">
                <label>轮播图片 *</label>
                <div class="upload-widget">
                    <input type="hidden" name="image" id="imageInput" value="">
                    <input type="file" id="imageFile" accept="image/*" style="display:none;">
                    <button type="button" class="btn btn-default" id="imageUploadBtn"><i class="fas fa-upload"></i> 本地上传</button>
                </div>
                <img src="" id="imagePreview" class="image-preview" style="display:none;max-width:400px;margin-top:10px;">
                <p class="text-muted" style="font-size:12px;margin-top:5px;">建议尺寸：1920x500 像素</p>
            </div>

            <div class="form-group">
                <label>跳转链接</label>
                <input type="text" name="url" class="form-control" placeholder="请输入跳转链接，如：/article/1">
            </div>

            <div class="form-group">
                <label>排序</label>
                <input type="number" name="sort" class="form-control" value="0">
            </div>

            <div class="form-group">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>

            <div class="form-group">
                <button type="button" id="submitBtn" class="btn btn-primary"><i class="fas fa-save"></i> 保存</button>
                <a href="/admin/banner" class="btn btn-default">取消</a>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="script"}
<script>
$(document).on('click', '#imageUploadBtn', function() {
    $('#imageFile').click();
});
$('#imageFile').change(function() {
    var file = this.files[0];
    if (!file) return;
    var formData = new FormData();
    formData.append('file', file);
    $.ajax({
        url: '/admin/upload/image',
        type: 'POST',
        dataType: 'json',
        data: formData,
        processData: false,
        contentType: false,
        success: function(res) {
            if (res.code === 1) {
                $('#imageInput').val(res.data.url);
                $('#imagePreview').attr('src', res.data.url).show();
            } else {
                alert(res.msg || '上传失败');
            }
        },
        error: function() { alert('上传请求失败'); }
    });
});

$(document).on('click', '#submitBtn', function() {
    $.ajax({
        url: '/admin/banner/add',
        type: 'POST',
        dataType: 'json',
        data: $('#bannerForm').serialize(),
        success: function(res) {
            if (res.code === 1) {
                alert('添加成功');
                location.href = '/admin/banner';
            } else {
                alert(res.msg || '添加失败');
            }
        },
        error: function(xhr, status, err) {
            alert('请求失败: ' + status + ' ' + err);
        }
    });
});
</script>
{/block}
