
worker_processes  1;
error_log  E:/claude/demo/newsite/application/logs/error.log;
pid        E:/claude/demo/newsite/application/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       E:/claude/demo/newsite/application/conf/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;
        root   E:/claude/demo/site/news-site/public;
        index  index.php;

        charset utf-8;

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
        }

        # /static/ 路径直接由 Nginx 服务
        location /static/ {
        }

        # 静态文件（找不到则 fallback 给 ThinkPHP 处理）
        location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|ico)$ {
            try_files $uri /index.php?_static=$uri&$query_string;
            expires 30d;
            access_log off;
        }

        # ThinkPHP URL 重写（所有其他请求）
        location / {
            try_files $uri $uri/ /index.php?s=$uri&$query_string;
        }

        # PHP 处理
        location ~ \.php {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_split_path_info ^(.+\.php)(.*)$;
            fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            fastcgi_param  PATH_INFO       $fastcgi_path_info;
            fastcgi_param  PATH_TRANSLATED $document_root$fastcgi_path_info;
            include        E:/claude/demo/newsite/application/conf/fastcgi_params;
        }

        access_log  E:/claude/demo/newsite/application/logs/news-site.access.log;
        error_log   E:/claude/demo/newsite/application/logs/news-site.error.log;
    }
}
