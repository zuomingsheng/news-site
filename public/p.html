<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>高性能8路FLV直播流播放器 - WebSocket</title>
    <!-- 引入 flv.js 最新稳定版，高性能FLV解码库，支持WebSocket协议 -->
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.4/dist/flv.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 轻微提升性能，避免选择干扰 */
        }

        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 主容器，两排布局，每排4个，采用Grid完美适配，高性能CSS渲染 */
        .stream-grid {
            max-width: 1600px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            background: transparent;
            margin: 0 auto;
        }

        /* 每个视频卡片 */
        .video-card {
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            aspect-ratio: 16 / 9; /* 保持16:9宽高比，统一视觉，避免布局抖动 */
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(0px); /* 无额外开销 */
        }

        .video-card:hover {
            transform: scale(1.01);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        /* video 元素填满卡片区域，硬解码渲染 */
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* 保持完整画面，不裁剪，适合监控流 */
            background: #000;
            outline: none;
            display: block;
        }

        /* 自定义信息栏：显示标题/状态/重连指示 */
        .video-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 8px 10px 6px;
            font-size: 12px;
            color: #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            z-index: 2;
            font-weight: 500;
            text-shadow: 0 1px 2px black;
        }

        .stream-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 0.3px;
        }

        .status-badge {
            background: rgba(30, 30, 40, 0.85);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: bold;
            backdrop-filter: blur(2px);
            pointer-events: auto;  /* 允许后续如果有手动重连可点，但主要显示状态 */
            font-family: monospace;
        }

        .status-badge.playing {
            background: #10b981;
            color: white;
            box-shadow: 0 0 4px #10b981;
        }
        .status-badge.buffering {
            background: #f59e0b;
            color: #1e1e2a;
        }
        .status-badge.error {
            background: #ef4444;
            color: white;
        }
        .status-badge.reconnecting {
            background: #3b82f6;
            color: white;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* 全局控制栏，辅助性能提示 */
        .performance-bar {
            width: 100%;
            max-width: 1600px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1f2c;
            padding: 8px 20px;
            border-radius: 60px;
            color: #ccc;
            font-size: 13px;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-family: monospace;
        }
        button {
            background: #2d3748;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            font-size: 12px;
        }
        button:hover {
            background: #4a5b7a;
            transform: scale(0.98);
        }
        .badge {
            background: #10b98122;
            padding: 4px 12px;
            border-radius: 30px;
            border-left: 3px solid #10b981;
        }

        @media (max-width: 1000px) {
            .stream-grid {
                gap: 10px;
            }
            .video-info {
                font-size: 9px;
                padding: 4px 6px;
            }
        }
        @media (max-width: 780px) {
            .stream-grid {
                grid-template-columns: repeat(2, 1fr); /* 手机自动变成两列，但保持每排两个？但需求是两排每排4个，桌面下确保4列，平板降级但不影响原始需求 */
            }
            body {
                padding: 12px;
            }
        }
        @media (min-width: 1200px) {
            .stream-grid {
                gap: 20px;
            }
        }
    </style>
</head>
<body>

<div class="performance-bar">
    <div class="badge">⚡ 超高性能模式 | WebSocket FLV 直连</div>
    <div class="stats">
        <span>📡 8路并发 | 🚀 硬件解码 + Worker线程</span>
        <span id="liveStat">🟢 播放中</span>
    </div>
    <button id="reconnectAllBtn">🔄 全部重连</button>
</div>

<div class="stream-grid" id="streamGrid"></div>

<script>
    // ======================= 配置区域 ==========================
    // 注意: 请根据实际8路流地址修改此数组。
    // 示例中基于提供的地址模式生成了8个不同的地址(后缀ID递增)，实际使用请替换为真实的8个ws地址。
    // 为了保证高性能演示，这里构造了8个合法模式的地址(用户请按需修改):
    const BASE_WS_URL = "ws://192.168.80.34:6080/rtp/";
    // 原始示例: 34020000001110000005_34020000001320000001.live.flv?originTypeStr=rtp_push
    // 生成8个不同的设备对 (设备ID_目标ID)
    const streamSuffixList = [
        "34020000001110000005_34020000001320000001",
        "34020000001110000006_34020000001320000002",
        "34020000001110000007_34020000001320000003",
        "34020000001110000008_34020000001320000004",
        "34020000001110000009_34020000001320000005",
        "34020000001110000010_34020000001320000006",
        "34020000001110000011_34020000001320000007",
        "34020000001110000012_34020000001320000008"
    ];
    
    // 生成8个完整的WebSocket FLV地址
    const STREAM_URLS = streamSuffixList.map(suffix => 
        `${BASE_WS_URL}${suffix}.live.flv?originTypeStr=rtp_push`
    );
    
    // 自定义显示名称 (简短，用于状态栏)
    const STREAM_NAMES = streamSuffixList.map((suffix, idx) => {
        // 提取后几位方便辨识
        const shortId = suffix.split('_')[1]?.slice(-8) || `Cam${idx+1}`;
        return `CAM-${idx+1} (${shortId})`;
    });

    // ======================= 高性能flv.js配置 ====================
    // 针对直播流 + 8路并发优化: 启用Worker(多线程解析)，减少主线程阻塞
    // 启用autoCleanup避免内存堆积，降低延迟配置，保证流畅性
    const FLV_CONFIG = {
        enableWorker: true,                // 关键: 开启worker线程，极大提升多路性能，避免UI卡顿
        enableStashBuffer: false,          // 直播流建议关闭缓存缓冲池，降低延迟，提高实时性 (配合网络良好)
        isLive: true,                      // 直播模式，不seek
        lazyLoad: false,                   // 禁用懒加载，保证持续拉流
        autoCleanupSourceBuffer: true,     // 自动清理SourceBuffer，避免内存溢出
        autoCleanupMaxBackwardDuration: 3, // 保留最近3秒数据，更激进的内存管理
        stashInitialSize: 128,             // 初始缓存128KB，减少启动延迟
        fixAudioTimestampGap: false,       // 若音频有问题可关闭，提升解码速度
        deferLoadAfterSourceOpen: false,   // 立即加载
        // 网络相关优化
        reconnectInterval: 1,              // 内部重连间隔 (我们外部会处理更稳健的重连，内部重连机制辅助)
        maxReconnectAttempts: 3,           // 内部尝试次数，我们外部会接管最终重连
    };

    // 全局播放器实例存储
    class StreamPlayerManager {
        constructor(containerId, streamUrls, streamNames) {
            this.container = document.getElementById(containerId);
            this.streamUrls = streamUrls;
            this.streamNames = streamNames;
            this.players = [];          // 存储每个播放器实例 { player, video, url, name, reconnectAttempts, statusElement, playerInstance }
            this.destroyed = false;
            this.initGrid();
        }

        // 创建网格DOM
        initGrid() {
            this.container.innerHTML = '';
            for (let i = 0; i < this.streamUrls.length; i++) {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.setAttribute('data-index', i);
                
                const video = document.createElement('video');
                video.muted = true;          // 静音自动播放策略 (浏览器自动播放策略要求)
                video.autoplay = true;
                video.playsInline = true;
                video.setAttribute('webkit-playsinline', 'true');
                video.setAttribute('x5-video-player-type', 'h5');
                // 禁用video控件（默认隐藏，但保留右键菜单不影响）
                video.controls = false;
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'video-info';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'stream-name';
                nameSpan.title = this.streamUrls[i];
                nameSpan.innerText = this.streamNames[i];
                const statusSpan = document.createElement('span');
                statusSpan.className = 'status-badge buffering';
                statusSpan.innerText = '⏳ 连接中';
                infoDiv.appendChild(nameSpan);
                infoDiv.appendChild(statusSpan);
                
                card.appendChild(video);
                card.appendChild(infoDiv);
                this.container.appendChild(card);
                
                // 存储播放器元数据
                this.players.push({
                    index: i,
                    video: video,
                    url: this.streamUrls[i],
                    name: this.streamNames[i],
                    statusElement: statusSpan,
                    cardElement: card,
                    playerInstance: null,      // flv.js实例
                    reconnectAttempts: 0,
                    reconnectTimer: null,
                    isManualDestroy: false,
                });
            }
            // 所有卡片创建完毕，开始初始化播放器
            this.initAllPlayers();
        }
        
        // 更新状态UI
        updateStatus(playerMeta, status, text) {
            if (!playerMeta.statusElement) return;
            const statusEl = playerMeta.statusElement;
            statusEl.innerText = text;
            // 移除所有状态class
            statusEl.classList.remove('playing', 'buffering', 'error', 'reconnecting');
            switch(status) {
                case 'playing':
                    statusEl.classList.add('playing');
                    break;
                case 'buffering':
                    statusEl.classList.add('buffering');
                    break;
                case 'error':
                    statusEl.classList.add('error');
                    break;
                case 'reconnecting':
                    statusEl.classList.add('reconnecting');
                    break;
                default: statusEl.classList.add('buffering');
            }
        }
        
        // 销毁单个播放器（完全清理，释放内存）
        async destroyPlayer(playerMeta, keepReconnectFlag = false) {
            if (playerMeta.reconnectTimer) {
                clearTimeout(playerMeta.reconnectTimer);
                playerMeta.reconnectTimer = null;
            }
            if (playerMeta.playerInstance) {
                try {
                    const inst = playerMeta.playerInstance;
                    if (inst) {
                        inst.pause();
                        inst.unload();
                        inst.detachMediaElement();
                        inst.destroy();
                    }
                } catch(e) {
                    console.warn(`[${playerMeta.name}] 销毁播放器异常:`, e);
                }
                playerMeta.playerInstance = null;
            }
            // 清理video src，防止内存残留
            if (playerMeta.video) {
                playerMeta.video.pause();
                playerMeta.video.removeAttribute('src');
                playerMeta.video.load();
            }
            if (!keepReconnectFlag) {
                playerMeta.reconnectAttempts = 0;
                if (!playerMeta.isManualDestroy) {
                    this.updateStatus(playerMeta, 'buffering', '⚡ 停止');
                }
            }
        }
        
        // 创建并启动播放器 (核心高性能逻辑)
        async createAndStartPlayer(playerMeta) {
            if (this.destroyed || playerMeta.isManualDestroy) return false;
            // 先销毁旧的实例避免冲突
            await this.destroyPlayer(playerMeta, true);
            
            // 检查flv.js是否可用
            if (!window.flvjs || !flvjs.isSupported()) {
                this.updateStatus(playerMeta, 'error', '❌ 不支持MSE');
                console.error('当前浏览器不支持flv.js (MediaSource Extension)');
                return false;
            }
            
            const videoEl = playerMeta.video;
            const url = playerMeta.url;
            
            try {
                // 创建flv.js播放器实例，应用高性能配置
                const player = flvjs.createPlayer({
                    type: 'flv',
                    isLive: true,
                    url: url,
                    cors: true,           // ws不受cors限制，但保持兼容
                }, FLV_CONFIG);
                
                playerMeta.playerInstance = player;
                player.attachMediaElement(videoEl);
                // 加载流
                player.load();
                // 启动播放
                const playPromise = player.play();
                if (playPromise !== undefined) {
                    playPromise.catch(err => {
                        console.warn(`[${playerMeta.name}] 自动播放失败:`, err);
                        // 如果因为未用户交互导致play()失败，静音状态下一般不会失败，但若失败降级提示
                        if (err.name === 'NotAllowedError') {
                            this.updateStatus(playerMeta, 'error', '🔇 需用户交互');
                        } else {
                            this.updateStatus(playerMeta, 'error', '⚠️ 播放错误');
                        }
                    });
                }
                
                // 绑定事件监听 (高性能事件处理)
                player.on(flvjs.Events.LOADING_COMPLETE, () => {
                    // 直播流loading完成，不特殊处理
                });
                player.on(flvjs.Events.MEDIA_INFO, (info) => {
                    // 收到媒体信息表示流正常
                    if (playerMeta.reconnectAttempts > 0) playerMeta.reconnectAttempts = 0;
                    this.updateStatus(playerMeta, 'playing', '▶ 流畅播放');
                });
                player.on(flvjs.Events.PLAYING, () => {
                    this.updateStatus(playerMeta, 'playing', '▶ 播放中');
                });
                player.on(flvjs.Events.PAUSE, () => {
                    if (playerMeta.playerInstance && !playerMeta.playerInstance._isEnded) {
                        // 意外暂停尝试恢复播放
                        setTimeout(() => {
                            if (playerMeta.playerInstance && playerMeta.video && !playerMeta.video.paused) return;
                            if (playerMeta.playerInstance && !playerMeta.isManualDestroy) {
                                playerMeta.playerInstance.play().catch(e=>{});
                            }
                        }, 100);
                    }
                });
                player.on(flvjs.Events.STATISTICS_INFO, (stat) => {
                    // 可选: 监控性能指标，但为了超高性能不做额外DOM操作，只内部记录
                    // 如果发现延迟过大可以动态调整，但无需UI
                });
                player.on(flvjs.Events.ERROR, (err) => {
                    console.error(`[${playerMeta.name}] flv错误:`, err);
                    // 错误类型判断: 网络错误或解码错误尝试重连
                    let errorMsg = '⚠️ 流错误';
                    if (err && err.info) {
                        if (err.info.indexOf('Network') !== -1) errorMsg = '📡 网络异常';
                        else if (err.info.indexOf('Codec') !== -1) errorMsg = '🎬 解码失败';
                    }
                    this.updateStatus(playerMeta, 'error', errorMsg);
                    // 触发自动重连 (非手动销毁状态)
                    if (!playerMeta.isManualDestroy && !this.destroyed) {
                        this.scheduleReconnect(playerMeta);
                    }
                });
                // 监听WebSocket底层关闭 (通过flv的statistics或借助内部，但ERROR已经涵盖)
                // 额外：监听video的stalled事件，如果长时间停滞触发重连
                const stallHandler = () => {
                    if (playerMeta.playerInstance && !playerMeta.isManualDestroy && !this.destroyed) {
                        const currentTime = playerMeta.video.currentTime;
                        if (playerMeta._lastStallCheck && (Date.now() - playerMeta._lastStallTime) > 3000) {
                            // 如果停滞过久主动重连
                            console.warn(`[${playerMeta.name}] 视频流停滞，主动重连`);
                            this.scheduleReconnect(playerMeta);
                        }
                        playerMeta._lastStallTime = Date.now();
                    }
                };
                videoEl.addEventListener('stalled', stallHandler);
                // 存储清理函数
                playerMeta._stallHandler = stallHandler;
                
                // 播放器就绪后重置重连计数
                player.on(flvjs.Events.METADATA_ARRIVED, () => {
                    playerMeta.reconnectAttempts = 0;
                    this.updateStatus(playerMeta, 'playing', '▶ 流畅播放');
                });
                
                return true;
            } catch (err) {
                console.error(`[${playerMeta.name}] 创建播放器失败:`, err);
                this.updateStatus(playerMeta, 'error', '❌ 启动失败');
                this.scheduleReconnect(playerMeta);
                return false;
            }
        }
        
        // 调度重连 (指数退避，保护服务器和网络)
        scheduleReconnect(playerMeta) {
            if (this.destroyed || playerMeta.isManualDestroy) return;
            if (playerMeta.reconnectTimer) clearTimeout(playerMeta.reconnectTimer);
            
            const maxAttempts = 8;
            const baseDelay = 2000; // 2秒起始
            let delay = Math.min(baseDelay * Math.pow(1.5, playerMeta.reconnectAttempts), 30000);
            if (playerMeta.reconnectAttempts >= maxAttempts) {
                this.updateStatus(playerMeta, 'error', '⛔ 重连失败上限');
                return;
            }
            playerMeta.reconnectAttempts++;
            this.updateStatus(playerMeta, 'reconnecting', `🔄 重连 ${playerMeta.reconnectAttempts}/${maxAttempts}`);
            
            playerMeta.reconnectTimer = setTimeout(async () => {
                if (this.destroyed || playerMeta.isManualDestroy) return;
                // 重新创建播放器
                const success = await this.createAndStartPlayer(playerMeta);
                if (!success && playerMeta.reconnectAttempts < maxAttempts) {
                    // 重试递归调度，但不额外增加attempts已经在上面增加了，继续使用同一计数器
                    this.scheduleReconnect(playerMeta);
                } else if (success) {
                    playerMeta.reconnectAttempts = 0;
                    this.updateStatus(playerMeta, 'playing', '▶ 恢复播放');
                }
                playerMeta.reconnectTimer = null;
            }, delay);
        }
        
        // 初始化所有播放器
        async initAllPlayers() {
            const promises = this.players.map(playerMeta => this.createAndStartPlayer(playerMeta));
            await Promise.allSettled(promises);
            // 全局统计信息展示
            this.updateGlobalStat();
            setInterval(() => this.updateGlobalStat(), 10000); // 每10秒更新一次全局统计状态
        }
        
        // 简单全局状态展示 (用于显示整体健康度)
        updateGlobalStat() {
            if (this.destroyed) return;
            const playingCount = this.players.filter(p => p.statusElement && p.statusElement.classList.contains('playing')).length;
            const errorCount = this.players.filter(p => p.statusElement && p.statusElement.classList.contains('error')).length;
            const reconnectingCount = this.players.filter(p => p.statusElement && p.statusElement.classList.contains('reconnecting')).length;
            const statSpan = document.getElementById('liveStat');
            if (statSpan) {
                if (playingCount === this.players.length) statSpan.innerHTML = '🟢 全流正常';
                else if (errorCount > 0) statSpan.innerHTML = `⚠️ ${playingCount}路在线 / ${errorCount}路异常`;
                else if (reconnectingCount > 0) statSpan.innerHTML = `🔄 重连中 ${reconnectingCount}路`;
                else statSpan.innerHTML = `📺 ${playingCount}/${this.players.length} 路活跃`;
            }
        }
        
        // 全部重连 (手动重置所有播放器)
        async reconnectAll() {
            for (const p of this.players) {
                if (p.reconnectTimer) clearTimeout(p.reconnectTimer);
                p.reconnectAttempts = 0;
                p.isManualDestroy = false;
                await this.destroyPlayer(p, true);
                this.updateStatus(p, 'buffering', '🔄 主动重连');
            }
            // 重新初始化所有
            for (const p of this.players) {
                await this.createAndStartPlayer(p);
            }
            this.updateGlobalStat();
        }
        
        // 完全销毁所有播放器 (页面卸载时调用)
        destroyAll() {
            this.destroyed = true;
            for (const p of this.players) {
                p.isManualDestroy = true;
                if (p.reconnectTimer) clearTimeout(p.reconnectTimer);
                this.destroyPlayer(p, false);
                // 移除额外事件
                if (p._stallHandler && p.video) {
                    p.video.removeEventListener('stalled', p._stallHandler);
                }
            }
            this.players = [];
        }
    }
    
    // 全局管理器实例
    let streamManager = null;
    
    // 页面启动: 等待DOM加载完成并确保flv.js就绪
    window.addEventListener('DOMContentLoaded', async () => {
        // 检测flvjs支持情况
        if (!window.flvjs) {
            console.error('flv.js 加载失败，请检查网络');
            document.getElementById('streamGrid').innerHTML = '<div style="color:red;text-align:center;grid-column:1/-1;">错误: flv.js库未能加载，请检查CDN或网络连接</div>';
            return;
        }
        if (!flvjs.isSupported()) {
            document.getElementById('streamGrid').innerHTML = '<div style="color:orange;text-align:center;grid-column:1/-1;">当前浏览器不支持MediaSourceExtension，无法播放FLV流</div>';
            return;
        }
        
        // 初始化管理器
        streamManager = new StreamPlayerManager('streamGrid', STREAM_URLS, STREAM_NAMES);
        
        // 绑定全局重连按钮
        const reconnectBtn = document.getElementById('reconnectAllBtn');
        if (reconnectBtn) {
            reconnectBtn.addEventListener('click', () => {
                if (streamManager) {
                    streamManager.reconnectAll();
                }
            });
        }
        
        // 页面可见性变化时，不销毁，但为了避免性能损耗在后台时不做额外操作，但flv.js内部worker会继续解码但不渲染?
        // 为了极致性能，后台时暂停video解码? 可做优化，但用户可能期望后台继续声音（静音）无大影响，不做额外处理。
        // 但是为了防止标签页冻结导致WS断线，flv内部重连会处理，故不需额外逻辑。
        
        // 页面关闭前释放所有资源 (重要)
        window.addEventListener('beforeunload', () => {
            if (streamManager) {
                streamManager.destroyAll();
            }
        });
    });
    
    // 输出启动日志，便于调试
    console.log('高性能8路FLV播放器已启动，配置: Worker多线程 + 低延迟直播模式');
</script>
</body>
</html>
